name: mountd docker dev

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/mountd-docker-dev.yml"
      - "deploy/**"
      - "src/**"
      - "pyproject.toml"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/mountd-docker-dev.yml"
      - "deploy/**"
      - "src/**"
      - "pyproject.toml"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: mountd-docker-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build mountd image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vicoslab/ccc-storage
          tags: |
            type=raw,value=dev
            type=sha,prefix=dev-,format=short
          labels: |
            org.opencontainers.image.title=ccc-storage-mountd
            org.opencontainers.image.description=CCC storage mountd service image

      - name: Build mountd image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/mountd.Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
