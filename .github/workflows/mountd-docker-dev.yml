name: mountd docker dev

on:
  workflow_dispatch:

concurrency:
  group: mountd-docker-dev-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: publish dev mountd image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dev mountd image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/mountd.Dockerfile
          push: true
          tags: vicoslab/ccc-storage:dev
          labels: |
            org.opencontainers.image.title=ccc-storage-mountd
            org.opencontainers.image.description=CCC storage mountd service image
          cache-from: type=gha
          cache-to: type=gha,mode=max
