name: mountd docker release

on:
  push:
    tags:
      # GitHub tag filters are globs, so the job validates the exact
      # v<digits>.<digits> release-tag shape before publishing.
      - "v*.*"

concurrency:
  group: mountd-docker-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: publish mountd image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Validate release tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Skipped::Tag '$tag' does not match ^v[0-9]+\\.[0-9]+$"
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.version.outputs.valid == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.version.outputs.valid == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.valid == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.version.outputs.valid == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vicoslab/ccc-storage
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=ccc-storage-mountd
            org.opencontainers.image.description=CCC storage mountd service image

      - name: Build and push mountd image
        if: steps.version.outputs.valid == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/mountd.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
