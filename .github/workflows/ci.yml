name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip dev extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy
        run: python -m mypy src

  unit:
    name: unit + core/pack coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip dev extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Capability probe
        run: python -c "from tests.fakes.capability import CAPS; print(CAPS)"
      - name: Unit tests with coverage gate
        run: >-
          python -m pytest tests/unit
          --cov=src/ccc_storage_core
          --cov=src/ccc_storage_pack
          --cov-report=term-missing
          --cov-fail-under=85

  fuse-unpriv:
    name: unprivileged FUSE tier (skip with reason when absent)
    runs-on: ubuntu-latest
    needs: [lint, unit]
    timeout-minutes: 20
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci-fuse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip dev extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run FUSE tier or skip with reason
        run: |
          python - <<'PY'
          from tests.fakes.capability import CAPS
          if not CAPS.unpriv_fuse:
              print('skip with reason: unprivileged FUSE stack unavailable on this runner')
              raise SystemExit(0)
          PY
          python -m pytest tests/unit tests/fuse -q -m "not kernel_mount and not docker"

  multinode:
    name: multinode fake-NFS harness
    runs-on: ubuntu-latest
    needs: [lint, unit]
    timeout-minutes: 20
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci-multinode
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip dev extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Multinode tests
        run: python -m pytest tests/unit tests/multinode -q

  bench-smoke:
    name: benchmark smoke tier
    runs-on: ubuntu-latest
    needs: [lint, unit]
    timeout-minutes: 10
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci-bench
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip dev extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Bench smoke or skip with reason
        run: |
          if [ ! -d tests/bench ] || ! find tests/bench -name 'test_*.py' -print -quit | grep -q .; then
            echo 'skip with reason: no bench tests in this phase'
            exit 0
          fi
          python -m pytest tests/bench -q -m bench

  kernel-mount:
    name: conditional kernel-mount tier
    runs-on: ubuntu-latest
    needs: [lint, unit]
    continue-on-error: true
    timeout-minutes: 15
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci-kernel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install pip dev extra
        run: python -m pip install -e '.[dev]'
      - name: Kernel mount lane or skip with reason
        run: |
          if ! unshare -r true >/dev/null 2>&1; then
            echo 'skip with reason: user namespaces unavailable for kernel-mount lane'
            exit 0
          fi
          python -m pytest tests/fuse -q -m kernel_mount

  real-s3:
    name: conditional real-S3 lane
    runs-on: ubuntu-latest
    needs: [lint, unit]
    continue-on-error: true
    timeout-minutes: 15
    env:
      CCC_TEST_ROOT: ${{ github.workspace }}/.scratch/ci-s3
    steps:
      - uses: actions/checkout@v4
      - name: Real S3 lane or skip with reason
        run: |
          if [ -z "${CCC_REAL_S3_BUCKET:-}" ]; then
            echo 'skip with reason: CCC_REAL_S3_BUCKET not configured'
            exit 0
          fi
          echo 'real S3 smoke would run here against configured credentials'
