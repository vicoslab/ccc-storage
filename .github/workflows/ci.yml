# Phase-00 CI skeleton — always-green, safe by construction.
#
# This lane needs NO Docker, NO privilege, NO real /storage, and NO network
# beyond installing the Python toolchain. It runs lint (ruff + mypy) and the
# unit tier only. The privileged / FUSE / kernel-mount / Docker / S3 lanes are
# stubbed below as `if:`-gated no-ops to be filled in by phase-09.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-unit:
    name: lint + unit (no Docker, no privilege)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Pip fallback toolchain. The canonical, pinned env is the ccc-dev conda
      # env (environment.yml); CI uses the lightweight pip `dev` extra. moto is
      # intentionally absent here — fake-S3 tests skip gracefully without it.
      - name: Install (pip dev extra)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Ruff (lint)
        run: python -m ruff check src tests

      - name: Mypy (types)
        run: python -m mypy src

      - name: Capability probe (informational)
        run: python -c "from tests.fakes.capability import CAPS; print(CAPS)"

      - name: Pytest (unit tier only)
        run: python -m pytest tests/unit -q

  # ---------------------------------------------------------------------------
  # Stubbed future lanes (phase-09). They never run today: each is gated on a
  # condition that is false on GitHub-hosted runners, so the workflow stays
  # green while documenting where the real jobs will go. Do NOT enable these
  # before phase-09 wires up the matching runners/capabilities.
  # ---------------------------------------------------------------------------

  fuse-unpriv:
    name: "[stub] unprivileged FUSE tier (phase-09)"
    runs-on: ubuntu-latest
    needs: lint-and-unit
    if: ${{ vars.CCC_ENABLE_FUSE_LANE == 'true' }}
    steps:
      - run: echo "Unprivileged FUSE tier is filled in by phase-09."

  kernel-mount:
    name: "[stub] kernel-mount tier via user+mount ns (phase-09)"
    runs-on: ubuntu-latest
    needs: lint-and-unit
    if: ${{ vars.CCC_ENABLE_KERNEL_LANE == 'true' }}
    steps:
      - run: echo "Kernel-mount (unshare -rm) tier is filled in by phase-09."

  docker-propagation:
    name: "[stub] Docker mount-propagation lane (phase-09)"
    runs-on: ubuntu-latest
    needs: lint-and-unit
    if: ${{ vars.CCC_ENABLE_DOCKER_LANE == 'true' }}
    steps:
      - run: echo "Docker propagation lane is filled in by phase-09."
